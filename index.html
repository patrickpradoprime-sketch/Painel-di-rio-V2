<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <h1>Minha Lista de Jogos (Supabase)</h1>
    <button id="btn-carregar">Carregar Jogos</button>
    
    <ul id="lista-jogos">
        </ul>

    <script>
        // 2. Configuração das credenciais (Substitua com os seus dados do painel do Supabase)
        const SUPABASE_URL = 'https://hunizkqqiaugyodsicct.supabase.co/rest/v1/';
        const SUPABASE_KEY = 'sb_publishable_HYi5xqfRuqZynuHccXg0KQ_m2zxAcwo';

        // 3. Inicializando o cliente do Supabase
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Função para buscar os dados da tabela
        async function buscarJogos() {
            const listaElement = document.getElementById('lista-jogos');
            listaElement.innerHTML = 'Carregando...';

            // 4. Fazendo a requisição à tabela 'jogos'
            // O equivalente em SQL seria: SELECT * FROM jogos;
            const { data, error } = await supabase
                .from('jogos')
                .select('*');

            if (error) {
                console.error('Erro ao buscar dados:', error);
                listaElement.innerHTML = 'Erro ao carregar os dados.';
                return;
            }

            // 5. Mostrando os dados na tela
            listaElement.innerHTML = ''; // Limpa o "Carregando..."
            data.forEach(jogo => {
                const li = document.createElement('li');
                li.textContent = `${jogo.titulo} - (${jogo.plataforma})`;
                listaElement.appendChild(li);
            });
        }

        // Atrelando a função ao botão
        document.getElementById('btn-carregar').addEventListener('click', buscarJogos);
    </script>
</body>
</html>
