<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Supabase - Gravação e Realtime</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .form-grupo { margin-bottom: 10px; }
        input { padding: 8px; width: 200px; }
        button { padding: 8px 15px; cursor: pointer; }
        ul { margin-top: 20px; }
    </style>
</head>
<body>

    <h1>Adicionar Novo Jogo</h1>
    <div class="form-grupo">
        <input type="text" id="input-titulo" placeholder="Título do Jogo">
    </div>
    <div class="form-grupo">
        <input type="text" id="input-plataforma" placeholder="Plataforma">
    </div>
    <button id="btn-salvar">Gravar no Banco</button>

    <h2>Lista de Jogos (Atualiza em Tempo Real ⚡)</h2>
    <ul id="lista-jogos">
        </ul>

    <script>
        // Credenciais configuradas corretamente
        const SUPABASE_URL = 'https://hunizkqqiaugyodsicct.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh1bml6a3FxaWF1Z3lvZHNpY2N0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxOTk1OTUsImV4cCI6MjA5Nzc3NTU5NX0.cdWnZURj4BJWGP6H6fR2r7RSjGK8JqZ0iA4yBJWVqLU';

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const listaElement = document.getElementById('lista-jogos');

        // --- 1. FUNÇÃO PARA BUSCAR OS JOGOS EXISTENTES ---
        async function carregarJogos() {
            const { data, error } = await supabaseClient.from('jogos').select('*');
            if (error) {
                console.error(error);
                return;
            }
            listaElement.innerHTML = '';
            data.forEach(jogo => adicionarJogoNaTela(jogo));
        }

        // Função auxiliar apenas para desenhar o jogo no HTML
        function adicionarJogoNaTela(jogo) {
            const li = document.createElement('li');
            li.textContent = `${jogo.titulo} - (${jogo.plataforma})`;
            listaElement.appendChild(li);
        }

        // --- 2. FUNÇÃO PARA GRAVAR (INSERT) NO BANCO ---
        async function gravarJogo() {
            const titulo = document.getElementById('input-titulo').value;
            const plataforma = document.getElementById('input-plataforma').value;

            if (!titulo || !plataforma) {
                alert('Preencha todos os campos!');
                return;
            }

            // O comando .insert() envia um objeto com os dados para as colunas do banco
            const { error } = await supabaseClient
                .from('jogos')
                .insert([{ titulo: titulo, plataforma: plataforma }]);

            if (error) {
                alert('Erro ao salvar: ' + error.message);
            } else {
                // Limpa os campos após salvar
                document.getElementById('input-titulo').value = '';
                document.getElementById('input-plataforma').value = '';
            }
        }

        // --- 3. CONFIGURAÇÃO DO REALTIME (TEMPO REAL) ---
        // Aqui dizemos para o Supabase ficar escutando qualquer mudança (INSERT) na tabela 'jogos'
        supabaseClient
            .channel('mudancas-jogos') // Cria um canal de comunicação livre
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'jogos' }, (payload) => {
                // O 'payload.new' traz os dados da linha que acabou de ser inserida no banco
                console.log('Novo dado recebido em tempo real:', payload.new);
                adicionarJogoNaTela(payload.new);
            })
            .subscribe();


        // Inicialização
        document.getElementById('btn-salvar').addEventListener('click', gravarJogo);
        carregarJogos(); // Carrega os jogos que já estavam no banco ao abrir a página
    </script>
</body>
</html>
